<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8" />
  <title>Simple Todo App</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="container">
    <h1>Todo App</h1>

    <form id="todo-form">
      <input 
        type="text" 
        id="todo-input" 
        placeholder="Введи задачу..." 
      />
      <button type="submit">Додати</button>
    </form>

    <ul id="todo-list"></ul>
  </div>

  <script src="app.js"></script>
</body>
</html>
